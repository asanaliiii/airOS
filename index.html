<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindOS - Операционная система в браузере</title>
    <meta name="description" content="WindOS — красивая и многофункциональная операционная система в браузере на JavaScript в духе Windows и macOS. Ручная работа без ИИ, зайдите оценить!">
	<link rel="icon" type="image/jpg" href="favicon.jpg">
<link rel="apple-touch-icon" href="favicon.jpg">
<link rel="shortcut icon" href="favicon.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- wind.css --!>
    <style>
        :root {
            --accent-color: #0078d4;
            --accent-gradient: linear-gradient(135deg, #0078d4, #00c6ff);
            --bg-blur: blur(30px) saturate(190%);
            --window-bg: rgba(25, 25, 25, 0.75);
            --taskbar-bg: rgba(15, 15, 15, 0.6);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-light: rgba(255, 255, 255, 0.12);
            --radius-lg: 16px;
            --radius-md: 10px;
            --taskbar-pos: bottom;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--text-main);
        }

        /* Рабочий стол */
        #desktop-environment {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover no-repeat;
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        #desktop-grid {
            flex: 1;
            position: relative;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-template-rows: repeat(auto-fill, 95px);
            grid-auto-flow: column;
            gap: 15px;
            align-content: flex-start;
        }

        .desktop-shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            border-radius: var(--radius-md);
            padding: 5px;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid transparent;
        }

        .desktop-shortcut:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .desktop-shortcut i {
            font-size: 32px;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .desktop-shortcut .icon-folder { color: #ffca28; }
        .desktop-shortcut .icon-file { color: #eceff1; }
        .desktop-shortcut .icon-app { color: #64b5f6; }

        .desktop-shortcut span {
            font-size: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Оконная система */
        #window-workspace {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 60px;
            pointer-events: none;
            z-index: 5;
        }

        .win12-window {
            position: absolute;
            width: 750px;
            height: 500px;
            background: var(--window-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            pointer-events: auto;
            transform: scale(1);
            opacity: 1;
            transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.2s;
        }

        .win12-window.minimized {
            transform: scale(0.7) translateY(300px);
            opacity: 0;
            pointer-events: none;
        }

        .win12-window.maximized {
            top: 4px !important; left: 4px !important;
            width: calc(100% - 8px) !important;
            height: calc(100% - 8px) !important;
            border-radius: 8px;
        }

        .window-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: move;
        }

        .window-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .window-controls {
            display: flex;
            gap: 5px;
        }

        .win-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: background 0.2s;
        }

        .win-btn:hover { background: rgba(255,255,255,0.15); }
        .win-btn.btn-close:hover { background: #e81123; color: white; }

        .window-body {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: rgba(10,10,10,0.2);
        }

        /* Панель задач */
        #taskbar {
            height: 60px;
            background: var(--taskbar-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: relative;
            z-index: 9999;
        }

        #taskbar-left { display: flex; align-items: center; gap: 12px; width: 250px; }
        #taskbar-center { display: flex; align-items: center; gap: 6px; justify-content: center; flex: 1; }
        #taskbar-right { display: flex; align-items: center; justify-content: flex-end; gap: 15px; width: 250px; text-align: right; }

        .taskbar-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
            position: relative;
        }

        .taskbar-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .taskbar-btn.active-dock::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 16px;
            height: 3px;
            background: var(--accent-color);
            border-radius: 2px;
            transition: width 0.2s;
        }
        
        .taskbar-btn.with-label {
            width: auto;
            padding: 0 12px;
            gap: 8px;
            font-size: 13px;
        }
        .taskbar-btn.with-label i { font-size: 18px; }

        #start-trigger {
            background: var(--accent-gradient);
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3);
        }

        #system-clock {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.4;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
        }
        #system-clock:hover { background: rgba(255,255,255,0.1); }

        /* Меню Пуск */
        #start-menu {
            position: absolute;
            bottom: -700px;
            left: 50%;
            transform: translateX(-50%);
            width: 680px;
            height: 580px;
            background: var(--window-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            z-index: 999;
            transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 25px;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        #start-menu.open { bottom: 75px; }

        .start-search-container {
            position: relative;
        }

        .start-search-container i {
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .start-search {
            width: 100%;
            height: 44px;
            border-radius: 22px;
            border: 1px solid var(--border-light);
            background: rgba(0,0,0,0.2);
            padding-left: 45px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .start-search:focus { border-color: var(--accent-color); }

        .start-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            overflow: hidden;
        }

        .start-side {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .start-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .apps-list, .pinned-grid {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .app-item-list {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.2s;
        }
        .app-item-list:hover { background: rgba(255,255,255,0.08); }
        .app-item-list i { font-size: 20px; width: 24px; text-align: center; }

        .pinned-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: max-content;
            gap: 12px;
        }

        .pinned-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: var(--radius-md);
            cursor: pointer;
            text-align: center;
            transition: background 0.2s, transform 0.2s;
        }
        .pinned-item:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.03);
        }
        .pinned-item i { font-size: 24px; margin-bottom: 8px; }

        /* Контекстное меню */
        #context-menu {
            position: absolute;
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 6px 0;
            width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100000;
            display: none;
        }

        .context-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .context-item:hover { background: rgba(255,255,255,0.1); }
        .context-item i { width: 20px; font-size: 14px; color: var(--text-muted); }
        .context-separator { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 0; }

        /* Стили внутренних окон приложений (Макет настроек и проводника) */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            color: white;
        }

        /* Настройки / Параметры */
        .settings-sidebar {
            width: 220px;
            background: rgba(0,0,0,0.15);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 15px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .settings-tab {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }
        .settings-tab:hover { background: rgba(255,255,255,0.06); }
        .settings-tab.active { background: rgba(255,255,255,0.1); font-weight: 600; color: var(--accent-color); }

        .settings-content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: none;
        }
        .settings-content.active { display: block; }

        .setting-section {
            margin-bottom: 25px;
        }
        .setting-section h3 { font-size: 16px; margin-bottom: 15px; font-weight: 600; }
        
        .control-row {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .btn-ui {
            padding: 8px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-ui:hover { background: rgba(255,255,255,0.15); }
        .btn-ui.primary { background: var(--accent-color); border: none; }
        .btn-ui.primary:hover { filter: brightness(1.1); }

        /* Проводник */
        .explorer-sidebar {
            width: 200px;
            background: rgba(0,0,0,0.1);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 15px 10px;
        }
        .explorer-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .explorer-toolbar {
            height: 45px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            background: rgba(0,0,0,0.05);
        }
        .explorer-view {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 85px);
            grid-template-rows: repeat(auto-fill, 90px);
            gap: 15px;
            overflow-y: auto;
        }

        /* Приложения */
        .calc-wrapper {
            display: grid;
            grid-template-rows: 80px 1fr;
            height: 100%;
            padding: 15px;
            gap: 10px;
        }
        .calc-screen {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            font-size: 28px;
            font-weight: 300;
            overflow: hidden;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .calc-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 6px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .calc-btn:hover { background: rgba(255,255,255,0.12); }
        .calc-btn.operator { background: rgba(255,255,255,0.1); color: var(--accent-color); font-weight: 600; }

        /* Блокнот */
        .notepad-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .notepad-textarea {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            color: white;
            padding: 15px;
            font-size: 14px;
            line-height: 1.5;
        }
        .notepad-footer {
            height: 26px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            font-size: 11px;
            color: var(--text-muted);
            gap: 15px;
        }

        /* Командная строка */
        .cmd-wrapper {
            background: #0c0c0c;
            height: 100%;
            padding: 15px;
            font-family: 'Consolas', monospace !important;
            overflow-y: auto;
            color: #cccccc;
            font-size: 14px;
        }
        .cmd-line { display: flex; gap: 8px; margin-top: 5px; }
        .cmd-input {
            background: transparent; border: none; outline: none; color: white;
            font-family: 'Consolas', monospace !important; flex: 1; font-size: 14px;
        }

        /* Paint */
        .paint-wrapper {
            display: grid;
            grid-template-columns: 70px 1fr;
            height: 100%;
        }
        .paint-toolbar {
            background: rgba(0,0,0,0.2);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 15px;
        }
        .paint-tool {
            width: 40px; height: 40px; border-radius: 6px; border: none;
            background: transparent; color: white; cursor: pointer; font-size: 16px;
        }
        .paint-tool.active { background: var(--accent-color); }
        .paint-canvas-container {
            background: #111; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 10px;
        }
        canvas { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: crosshair; }

        /* Диалоговое окно вопросов/ошибок */
        .dialog-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000000;
        }
        .dialog-box {
            width: 380px; background: #202020; border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg); padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .dialog-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .dialog-header i { font-size: 28px; }
        .dialog-header i.error { color: #f44336; }
        .dialog-header i.info { color: #2196f3; }
        .dialog-buttons { display: flex; justify-content: flex-end; gap: 10px; }

        /* Прогресс-бар для Хранилища */
        .storage-bar-container {
            width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin: 8px 0;
        }
        .storage-bar-fill {
            height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.5s ease;
        }

        /* Кастомизированные инпуты цвета */
        .color-picker-grid { display: flex; gap: 10px; margin-top: 10px; }
        .color-dot {
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.active { border-color: white; }

        /* Системный медиаплеер / Фотографии */
        .media-viewer, .photo-viewer {
            width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000;
        }
        .media-viewer video, .media-viewer audio { max-width: 90%; max-height: 80%; }
        .photo-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
</head>
<body>

<!-- os.js --!>
<div id="desktop-environment">
    <div id="desktop-grid" oncontextmenu="ui.showContextMenu(event, 'desktop')"></div>

    <div id="window-workspace"></div>

    <div id="start-menu">
        <div class="start-search-container">
            <i class="fa fa-search"></i>
            <input type="text" class="start-search" placeholder="Поиск приложений, файлов и настроек..." oninput="os.search(this.value)">
        </div>
        <div class="start-content">
            <div class="start-side">
                <div class="start-title">Все приложения</div>
                <div class="apps-list" id="start-apps-list"></div>
            </div>
            <div class="start-side">
                <div class="start-title">Закрепленные</div>
                <div class="pinned-grid" id="start-pinned-grid"></div>
            </div>
        </div>
    </div>

    <div id="taskbar" oncontextmenu="ui.showContextMenu(event, 'taskbar')">
        <div id="taskbar-left">
            <div style="font-size: 13px; font-weight: 600; opacity: 0.8;"><i class="fa-solid fa-cloud-sun" style="color: #ffb74d; margin-right: 6px;"></i> 24°C</div>
        </div>
        <div id="taskbar-center">
            <button class="taskbar-btn" id="start-trigger" onclick="ui.toggleStart()"><i class="fa-solid fa-wind"></i></button>
            <div id="taskbar-apps" style="display: flex; gap: 6px; align-items: center;"></div>
        </div>
        <div id="taskbar-right">
            <i class="fa fa-wifi"></i>
            <i class="fa fa-volume-high" onclick="audio.playSystemSound('question')"></i>
            <div id="system-clock"></div>
        </div>
    </div>
</div>

<div id="context-menu"></div>

<script>
/**
 * ==============================================================================
 * ЯДРО ВИРТУАЛЬНОЙ ФАЙЛОВОЙ СИСТЕМЫ (VFS) С ЛОГИКОЙ ХРАНЕНИЯ И СОРТИРОВКИ
 * ==============================================================================
 */
const VFS = {
    root: {
        "C:": {
            type: "dir",
            createdAt: Date.now() - 1000000,
            size: 4096,
            children: {
                "Windows 12": {
                    type: "dir",
                    createdAt: Date.now() - 900000,
                    size: 2048,
                    children: {
                        "System32": { type: "dir", createdAt: Date.now(), size: 1024, children: {} },
                        "Registry.log": { type: "file", content: "OS_X_LICENSED=true\nTHEME=dark", size: 124, createdAt: Date.now() }
                    }
                },
                "Desktop": {
                    type: "dir",
                    createdAt: Date.now() - 800000,
                    size: 1024,
                    children: {
                        "README": { type: "file", content: "Добро пожаловать в WindOS!\nСоздано с красивым дизайном.\n\nИспользуйте ПКМ для управления файловой структурой.", size: 310, createdAt: Date.now() }
                    }
                },
                "Downloads": { type: "dir", createdAt: Date.now(), size: 0, children: {} },
                "Music": { type: "dir", createdAt: Date.now(), size: 0, children: {} },
                "Pictures": { type: "dir", createdAt: Date.now(), size: 0, children: {} }
            }
        }
    },

    resolvePath(pathStr) {
        const parts = pathStr.split('/').filter(p => p);
        let current = this.root;
        for (const part of parts) {
            if (current[part] && current[part].type === "dir") {
                current = current[part].children;
            } else if (current[part]) {
                return current[part];
            } else {
                return null;
            }
        }
        return current;
    },

    createFile(parentPath, name, content = "", size = 0) {
        const dir = this.resolvePath(parentPath);
        if (dir && !dir[name]) {
            dir[name] = { type: "file", content: content, size: size || content.length, createdAt: Date.now() };
            os.refreshAllViews();
            return true;
        }
        return false;
    },

    createDirectory(parentPath, name) {
        const dir = this.resolvePath(parentPath);
        if (dir && !dir[name]) {
            dir[name] = { type: "dir", children: {}, size: 0, createdAt: Date.now() };
            os.refreshAllViews();
            return true;
        }
        return false;
    },

    getDirItems(pathStr, sortBy = 'name', descending = false) {
        const dir = this.resolvePath(pathStr);
        if (!dir) return [];
        let items = Object.keys(dir).map(key => ({ name: key, ...dir[key] }));
        
        items.sort((a, b) => {
            if (sortBy === 'size') return a.size - b.size;
            if (sortBy === 'date') return a.createdAt - b.createdAt;
            return a.name.localeCompare(b.name);
        });

        if (descending) items.reverse();
        return items;
    },

    calculateStorage() {
        let totalBytes = 512 * 1024 * 1024 * 1024; // 512 GB
        let usedBytes = 42.6 * 1024 * 1024 * 1024; // Базовый размер системы
        return {
            total: (totalBytes / (1024**3)).toFixed(0) + " ГБ",
            used: (usedBytes / (1024**3)).toFixed(1) + " ГБ",
            percentage: ((usedBytes / totalBytes) * 100).toFixed(1)
        };
    }
};

/**
 * ==============================================================================
 * ЗВУКОВОЙ ДВИЖОК СИНТЕЗА СИСТЕМНЫХ ОШИБОК И ДИАЛОГОВ (Web Audio API)
 * ==============================================================================
 */
const audio = {
    ctx: null,
    enabled: true,
    soundScheme: 'classic',

    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },

    playSystemSound(type) {
        if (!this.enabled) return;
        this.init();
        const now = this.ctx.currentTime;
        
        if (type === 'error') {
            // Двухтональный критический звук ошибки
            this.osc(150, 'sawtooth', 0.15, now);
            this.osc(110, 'sawtooth', 0.25, now + 0.05);
        } else if (type === 'question') {
            // Мягкий мажорный аккорд вопроса
            this.osc(330, 'sine', 0.1, now);
            this.osc(440, 'sine', 0.1, now + 0.05);
            this.osc(550, 'sine', 0.2, now + 0.1);
        } else if (type === 'success') {
            this.osc(523.25, 'sine', 0.1, now);
            this.osc(659.25, 'sine', 0.1, now + 0.08);
            this.osc(783.99, 'sine', 0.2, now + 0.16);
        }
    },

    osc(freq, type, duration, time) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(0.2, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(time);
        osc.stop(time + duration);
    }
};

/**
 * ==============================================================================
 * КОНФИГУРАЦИЯ И ПАРАМЕТРЫ ПРИЛОЖЕНИЙ И РЕЕСТРА ИНТЕРФЕЙСА
 * ==============================================================================
 */
const os = {
    registry: {
        accentColor: '#0078d4',
        taskbarPosition: 'bottom',
        groupWindows: 'true',
        wallpaper: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop',
        startLayout: 'default'
    },
    
    pinnedApps: ['explorer', 'edge', 'vscode', 'notepad', 'cmd'],
    activeWindows: [],
    zCounter: 10,

    init() {
        // Загрузка сохраненной персонализации
        if (localStorage.getItem('win12_reg')) {
            this.registry = JSON.parse(localStorage.getItem('win12_reg'));
        }
        this.applyRegistrySettings();
        this.buildStartMenu();
        this.refreshDesktop();
        
        // Запуск часов
        setInterval(() => {
            const d = new Date();
            document.getElementById('system-clock').innerHTML = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + "<br>" + d.toLocaleDateString();
        }, 1000);
    },

    applyRegistrySettings() {
        const root = document.documentElement;
        root.style.setProperty('--accent-color', this.registry.accentColor);
        root.style.setProperty('--accent-gradient', `linear-gradient(135deg, ${this.registry.accentColor}, #00c6ff)`);
        root.style.setProperty('--taskbar-pos', this.registry.taskbarPosition);
        document.getElementById('desktop-environment').style.backgroundImage = `url('${this.registry.wallpaper}')`;
        
        // Управление позиционированием панели задач через flex-flow родителя
        const env = document.getElementById('desktop-environment');
        if (this.registry.taskbarPosition === 'top') {
            env.style.flexDirection = 'column-reverse';
            document.getElementById('taskbar').style.borderTop = 'none';
            document.getElementById('taskbar').style.borderBottom = '1px solid var(--border-light)';
        } else {
            env.style.flexDirection = 'column';
            document.getElementById('taskbar').style.borderBottom = 'none';
            document.getElementById('taskbar').style.borderTop = '1px solid var(--border-light)';
        }
        this.renderTaskbarDock();
        localStorage.setItem('win12_reg', JSON.stringify(this.registry));
    },

    apps: {
        calc: { title: "Калькулятор", icon: "fa-solid fa-calculator", render: () => ui.templates.calc() },
        notepad: { title: "Блокнот", icon: "fa-solid fa-file-lines", render: (p) => ui.templates.notepad(p) },
        explorer: { title: "Проводник", icon: "fa-solid fa-folder-open", render: (p) => ui.templates.explorer(p) },
        edge: { title: "Wind Edge", icon: "fa-brands fa-edge", render: () => ui.templates.edge() },
        vscode: { title: "Visual Studio Code", icon: "fa-solid fa-code", render: () => ui.templates.vscode() },
        cmd: { title: "Командная строка", icon: "fa-solid fa-terminal", render: () => ui.templates.cmd() },
        paint: { title: "Paint", icon: "fa-solid fa-palette", render: () => ui.templates.paint() },
        settings: { title: "Параметры", icon: "fa-solid fa-gear", render: () => ui.templates.settings() },
        media: { title: "Медиаплеер", icon: "fa-solid fa-play", render: (p) => ui.templates.media(p) },
        photos: { title: "Фотографии", icon: "fa-solid fa-image", render: (p) => ui.templates.photos(p) },
        github: { title: "Исходный код страницы", icon: "fa-github", render: () => ui.templates.github() },
    },

    openApp(appKey, params = null) {
        const appDef = this.apps[appKey];
        if (!appDef) return;

        // Генерация ID для инстанса окна
        const winId = 'win_' + appKey + '_' + Math.random().toString(36).substr(2, 9);
        this.zCounter++;

        const winHtml = `
            <div id="${winId}" class="win12-window" style="z-index: ${this.zCounter}; left: ${100 + (this.activeWindows.length * 25)}px; top: ${80 + (this.activeWindows.length * 25)}px;" onclick="os.focusWindow('${winId}')">
                <div class="window-header" onmousedown="ui.dragWindow(event, '${winId}')">
                    <div class="window-title"><i class="${appDef.icon}"></i> ${appDef.title} ${params ? '- ' + params.name : ''}</div>
                    <div class="window-controls">
                        <button class="win-btn" onclick="os.minimizeWindow('${winId}', event)"><i class="fa fa-minus"></i></button>
                        <button class="win-btn" onclick="os.maximizeWindow('${winId}', event)"><i class="fa fa-expand"></i></button>
                        <button class="win-btn btn-close" onclick="os.closeWindow('${winId}', event)"><i class="fa fa-times"></i></button>
                    </div>
                </div>
                <div class="window-body">${appDef.render(params)}</div>
            </div>
        `;

        document.getElementById('window-workspace').insertAdjacentHTML('beforeend', winHtml);
        this.activeWindows.push({ id: winId, key: appKey, title: appDef.title, icon: appDef.icon });
        this.renderTaskbarDock();
        
        // Инициализация скриптов внутри приложений при надобности
        if (appKey === 'cmd') ui.initCMD(winId);
        if (appKey === 'paint') ui.initPaint(winId);
    },

    focusWindow(id) {
        const el = document.getElementById(id);
        if (el) {
            this.zCounter++;
            el.style.zindex = this.zCounter;
            el.classList.remove('minimized');
        }
    },

    minimizeWindow(id, e) {
        if (e) e.stopPropagation();
        document.getElementById(id).classList.add('minimized');
    },

    maximizeWindow(id, e) {
        if (e) e.stopPropagation();
        document.getElementById(id).classList.toggle('maximized');
    },

    closeWindow(id, e) {
        if (e) e.stopPropagation();
        document.getElementById(id).remove();
        this.activeWindows = this.activeWindows.filter(w => w.id !== id);
        this.renderTaskbarDock();
    },

    toggleWindowDock(id) {
        const el = document.getElementById(id);
        if (el.classList.contains('minimized')) {
            this.focusWindow(id);
        } else {
            this.minimizeWindow(id);
        }
    },

    refreshAllViews() {
        this.refreshDesktop();
        // Механизм обновления открытых Проводников
        document.querySelectorAll('.explorer-view').forEach(view => {
            const path = view.getAttribute('data-current-path');
            if (path) ui.renderExplorerPath(view.closest('.win12-window').id, path);
        });
    },

    refreshDesktop() {
        const grid = document.getElementById('desktop-grid');
        grid.innerHTML = '';
        
        // Автоматические ярлыки "Этот Компьютер" и "Параметры"
        grid.insertAdjacentHTML('beforeend', `
            <div class="desktop-shortcut" ondblclick="os.openApp('explorer', {path: 'C:'})">
                <i class="fa-solid fa-desktop" style="color: #4fc3f7;"></i>
                <span>Этот компьютер</span>
            </div>
            <div class="desktop-shortcut" ondblclick="os.openApp('settings')">
                <i class="fa-solid fa-gear" style="color: #b0bec5;"></i>
                <span>Параметры</span>
            </div>
        `);

        const desktopItems = VFS.getDirItems('C:/Desktop');
        desktopItems.forEach(item => {
            let iconClass = "fa-solid fa-file-lines icon-file";
            let action = `os.openApp('notepad', {path: 'C:/Desktop/${item.name}', name: '${item.name}'})`;
            
            if (item.type === 'dir') {
                iconClass = "fa-solid fa-folder icon-folder";
                action = `os.openApp('explorer', {path: 'C:/Desktop/${item.name}'})`;
            } else if (item.name.endsWith('.mp3') || item.name.endsWith('.mp4') || item.name.endsWith('.wav')) {
                iconClass = "fa-solid fa-video icon-app";
                action = `os.openApp('media', {path: 'C:/Desktop/${item.name}', name: item.name})`;
            } else if (item.name.endsWith('.png') || item.name.endsWith('.jpg') || item.name.endsWith('.webp') || item.name.endsWith('.svg')) {
                iconClass = "fa-solid fa-image icon-app";
                action = `os.openApp('photos', {path: 'C:/Desktop/${item.name}', name: item.name})`;
            }

            grid.insertAdjacentHTML('beforeend', `
                <div class="desktop-shortcut" ondblclick="${action}" draggable="true" oncontextmenu="ui.showContextMenu(event, 'file', {path: 'C:/Desktop', name: '${item.name}'})">
                    <i class="${iconClass}"></i>
                    <span>${item.name}</span>
                </div>
            `);
        });
    },

    buildStartMenu() {
        const list = document.getElementById('start-apps-list');
        const pinned = document.getElementById('start-pinned-grid');
        list.innerHTML = ''; pinned.innerHTML = '';

        // Заполнение списка всех приложений
        Object.keys(this.apps).forEach(key => {
            list.insertAdjacentHTML('beforeend', `
                <div class="app-item-list" onclick="os.openApp('${key}'); ui.toggleStart();">
                    <i class="${this.apps[key].icon}"></i>
                    <span>${this.apps[key].title}</span>
                </div>
            `);
        });

        // Заполнение закрепленных системных утилит
        this.pinnedApps.forEach(key => {
            if (this.apps[key]) {
                pinned.insertAdjacentHTML('beforeend', `
                    <div class="pinned-item" onclick="os.openApp('${key}'); ui.toggleStart();">
                        <i class="${this.apps[key].icon}"></i>
                        <div style="font-size: 11px;">${this.apps[key].title}</div>
                    </div>
                `);
            }
        });
    },

    renderTaskbarDock() {
        const container = document.getElementById('taskbar-apps');
        container.innerHTML = '';

        if (this.registry.groupWindows === 'true') {
            // Группировка: По одной иконке на каждый класс запущенного или закрепленного приложения
            const uniqueKeys = new Set([...this.pinnedApps, ...this.activeWindows.map(w => w.key)]);
            uniqueKeys.forEach(key => {
                const appDef = this.apps[key];
                const instances = this.activeWindows.filter(w => w.key === key);
                const isActive = instances.length > 0;
                
                container.insertAdjacentHTML('beforeend', `
                    <button class="taskbar-btn ${isActive ? 'active-dock' : ''}" onclick="os.handleGroupDockClick('${key}')" title="${appDef.title}">
                        <i class="${appDef.icon}"></i>
                    </button>
                `);
            });
        } else {
            // Без группировки: Каждое окно имеет отдельную широкую плашку с подписью
            this.activeWindows.forEach(win => {
                container.insertAdjacentHTML('beforeend', `
                    <button class="taskbar-btn with-label active-dock" onclick="os.toggleWindowDock('${win.id}')">
                        <i class="${win.icon}"></i>
                        <span>${win.title}</span>
                    </button>
                `);
            });
        }
    },

    handleGroupDockClick(key) {
        const instances = this.activeWindows.filter(w => w.key === key);
        if (instances.length === 0) {
            this.openApp(key);
        } else if (instances.length === 1) {
            this.toggleWindowDock(instances[0].id);
        } else {
            // Если инстансов много - фокусим по очереди
            const firstMin = instances.find(w => document.getElementById(w.id).classList.contains('minimized'));
            if (firstMin) this.focusWindow(firstMin.id);
            else this.focusWindow(instances[0].id);
        }
    },

    search(query) {
        const list = document.getElementById('start-apps-list');
        list.innerHTML = '';
        Object.keys(this.apps).forEach(key => {
            if (this.apps[key].title.toLowerCase().includes(query.toLowerCase())) {
                list.insertAdjacentHTML('beforeend', `
                    <div class="app-item-list" onclick="os.openApp('${key}'); ui.toggleStart();">
                        <i class="${this.apps[key].icon}"></i>
                        <span>${this.apps[key].title}</span>
                    </div>
                `);
            }
        });
    }
};

/**
 * ==============================================================================
 * МОДУЛЬ ИНТЕРФЕЙСА (UI), МАКЕТЫ ШАБЛОНОВ И ДИНАМИЧЕСКИЕ ОБРАБОТЧИКИ
 * ==============================================================================
 */
const ui = {
    toggleStart() {
        document.getElementById('start-menu').classList.toggle('open');
    },

    dragWindow(e, id) {
        const el = document.getElementById(id);
        if (el.classList.contains('maximized')) return;
        os.focusWindow(id);
        
        let startX = e.clientX;
        let startY = e.clientY;
        let initialLeft = el.offsetLeft;
        let initialTop = el.offsetTop;

        function doDrag(me) {
            el.style.left = (initialLeft + me.clientX - startX) + 'px';
            el.style.top = (initialTop + me.clientY - startY) + 'px';
        }

        function stopDrag() {
            document.removeEventListener('mousemove', doDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', stopDrag);
    },

    showContextMenu(e, type, payload = null) {
        e.preventDefault();
        const menu = document.getElementById('context-menu');
        menu.style.left = e.clientX + 'px';
        menu.style.top = e.clientY + 'px';
        menu.style.display = 'block';

        let html = '';
        if (type === 'desktop' || type === 'explorer_dir') {
            const path = payload ? payload.path : 'C:/Desktop';
            html = `
                <div class="context-item" onclick="ui.triggerCreateFile('${path}')"><i class="fa fa-file"></i> Создать Текстовик</div>
                <div class="context-item" onclick="ui.triggerCreateDir('${path}')"><i class="fa fa-folder-plus"></i> Создать Папку</div>
                <div class="context-separator"></div>
                <div class="context-item"><span>Сортировка</span><i class="fa fa-chevron-right"></i></div>
                <div style="padding-left:15px;">
                    <div class="context-item" onclick="ui.setSorting('name')"><i class="fa fa-font"></i> По имени</div>
                    <div class="context-item" onclick="ui.setSorting('date')"><i class="fa fa-calendar"></i> По дате</div>
                    <div class="context-item" onclick="ui.setSorting('size')"><i class="fa fa-database"></i> По размеру</div>
                </div>
            `;
        } else if (type === 'file') {
            html = `
                <div class="context-item" onclick="ui.deleteFile('${payload.path}', '${payload.name}')"><i class="fa fa-trash"></i> Удалить</div>
                <div class="context-item"><i class="fa fa-edit"></i> Переименовать</div>
            `;
        } else {
            html = `<div class="context-item" onclick="os.openApp('settings')"><i class="fa fa-sliders"></i> Параметры панели</div>`;
        }

        menu.innerHTML = html;

        // Клик в любом месте для закрытия меню
        setTimeout(() => {
            document.addEventListener('click', () => menu.style.display = 'none', {once: true});
        }, 50);
    },

    // Конструктор UI-диалогов предупреждений
    showDialog(title, message, type = 'info') {
        audio.playSystemSound(type === 'error' ? 'error' : 'question');
        const id = 'dialog_' + Math.random().toString(36).substr(2,9);
        const html = `
            <div class="dialog-overlay" id="${id}">
                <div class="dialog-box">
                    <div class="dialog-header">
                        <i class="${type==='error'?'fa-solid fa-circle-xmark error':'fa-solid fa-circle-question info'}"></i>
                        <div>
                            <strong style="display:block; font-size:15px;">${title}</strong>
                            <span style="font-size:13px; color: var(--text-muted);">${message}</span>
                        </div>
                    </div>
                    <div class="dialog-buttons">
                        <button class="btn-ui primary" onclick="document.getElementById('${id}').remove()">OK</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('desktop-environment').insertAdjacentHTML('beforeend', html);
    },

    triggerCreateFile(path) {
        const name = prompt("Введите имя файла:", "Новый текстовый документ.txt");
        if (name) VFS.createFile(path, name, "Новый контент");
    },

    triggerCreateDir(path) {
        const name = prompt("Введите имя папки:", "Новая папка");
        if (name) VFS.createDirectory(path, name);
    },

    deleteFile(path, name) {
        const dir = VFS.resolvePath(path);
        if (dir && dir[name]) {
            delete dir[name];
            os.refreshAllViews();
        }
    },

    setSorting(type) {
        // Меняет глобальный тип сортировки во всех окнах проводников
        window.currentSortBy = type;
        os.refreshAllViews();
    },

    // Переключение вкладок в Параметрах
    switchSettingsTab(tabKey, btn) {
        const parent = btn.closest('.win12-window');
        parent.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
        parent.querySelectorAll('.settings-content').forEach(c => c.classList.remove('active'));
        
        btn.classList.add('active');
        parent.querySelector(`.settings-content[data-tab="${tabKey}"]`).classList.add('active');
    },

    renderExplorerPath(winId, path) {
        const view = document.getElementById(winId).querySelector('.explorer-view');
        view.setAttribute('data-current-path', path);
        view.innerHTML = '';

        const items = VFS.getDirItems(path, window.currentSortBy || 'name');
        items.forEach(item => {
            let icon = "fa-solid fa-file icon-file";
            let action = `os.openApp('notepad', {path: '${path}/${item.name}', name: '${item.name}'})`;
            
            if (item.type === 'dir') {
                icon = "fa-solid fa-folder icon-folder";
                action = `ui.renderExplorerPath('${winId}', '${path}/${item.name}')`;
            } else if (item.name.endsWith('.mp3') || item.name.endsWith('.mp4') || item.name.endsWith('.wav')) {
                icon = "fa-solid fa-circle-play";
                action = `os.openApp('media', {path: '${path}/${item.name}', name: '${item.name}'})`;
            } else if (item.name.endsWith('.png') || item.name.endsWith('.jpg') || item.name.endsWith('.webp') || item.name.endsWith('.svg')) {
                icon = "fa-solid fa-image";
                action = `os.openApp('photos', {path: '${path}/${item.name}', name: '${item.name}'})`;
            }

            view.insertAdjacentHTML('beforeend', `
                <div class="desktop-shortcut" ondblclick="${action}" oncontextmenu="ui.showContextMenu(event, 'file', {path: '${path}', name: '${item.name}'})">
                    <i class="${icon}"></i>
                    <span>${item.name}</span>
                </div>
            `);
        });
    },

    handleHostUpload(event, winId) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const view = document.getElementById(winId).querySelector('.explorer-view');
            const currentPath = view.getAttribute('data-current-path') || 'C:/Desktop';
            
            // Заливаем файл в виртуальную VFS
            VFS.createFile(currentPath, file.name, e.target.result, file.size);
            ui.showDialog("Файловая система", `Файл ${file.name} успешно интегрирован в подсистему Windows 12`, "success");
        };
        
        if (file.type.startsWith('text') || file.name.endsWith('.txt')) {
            reader.readAsText(file);
        } else {
            reader.readAsDataURL(file); // Для медиа, картинок
        }
    },

    /**
     * ==============================================================================
     * СКРИПТЫ И ОБРАБОТЧИКИ СЛОЖНОЙ ЛОГИКИ ПРИЛОЖЕНИЙ
     * ==============================================================================
     */
    initCMD(winId) {
        const win = document.getElementById(winId);
        const input = win.querySelector('.cmd-input');
        const output = win.querySelector('.cmd-output');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmdText = input.value.trim();
                output.innerHTML += `\nC:\\Users\\Admin&gt; ${cmdText}`;
                
                const parts = cmdText.split(' ');
                const coreCmd = parts[0].toLowerCase();

                if (coreCmd === 'cls') {
                    output.innerHTML = 'Windows 12 [Version 12.0.22H2]\n(c) Все права защищены автором Асанали.';
                } else if (coreCmd === 'dir') {
                    const items = VFS.getDirItems('C:');
                    let str = '\n Содержимое папки C:\\\n';
                    items.forEach(i => str += `${i.createdAt}  ${i.type.toUpperCase().padEnd(6)}  ${i.size}  ${i.name}\n`);
                    output.innerHTML += str;
                } else if (coreCmd === 'registry' && parts[1] === 'set') {
                    const key = parts[2];
                    const val = parts[3];
                    if (os.registry[key] !== undefined) {
                        os.registry[key] = val;
                        os.applyRegistrySettings();
                        output.innerHTML += `\nПараметр реестра [${key}] изменен на [${val}].`;
                    } else {
                        output.innerHTML += `\nОшибка: Параметр не найден.`;
                    }
                } else if (coreCmd === 'curl') {
                    output.innerHTML += `\nЗапрос к серверу через симулятор curl...\nHTTP/1.1 200 OK\nContent-Type: application/json\n\n{"status": "success", "agent": "WindOS-Kernel-Parody"}`;
                } else if (cmdText !== "") {
                    output.innerHTML += `\n"${coreCmd}" не является внутренней или внешней командой, исполняемой программой или пакетным файлом.`;
                }

                input.value = '';
                win.querySelector('.cmd-wrapper').scrollTop = win.querySelector('.cmd-wrapper').scrollHeight;
            }
        });
    },

    initPaint(winId) {
        const win = document.getElementById(winId);
        const canvas = win.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let color = '#0078d4';

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        win.querySelectorAll('.paint-tool').forEach(btn => {
            btn.addEventListener('click', () => {
                color = btn.getAttribute('data-color');
            });
        });

        canvas.addEventListener('mousedown', () => painting = true);
        canvas.addEventListener('mouseup', () => { ctx.beginPath(); painting = false; });
        canvas.addEventListener('mousemove', (e) => {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });
    },

    updateNotepadStats(textarea) {
        const text = textarea.value;
        const charCount = text.length;
        const lineCount = text.split('\n').length;
        const readTime = Math.ceil(text.split(/\s+/).filter(Boolean).length / 200);
        
        const footer = textarea.closest('.notepad-wrapper').querySelector('.notepad-footer');
        footer.innerHTML = `<span>Строк: ${lineCount}</span><span>Символов: ${charCount}</span><span>Время чтения: ${readTime} мин.</span>`;
        
        // Сохранение изменений в VFS по путям документов
        const path = textarea.getAttribute('data-vfs-path');
        if (path) {
            const fileNode = VFS.resolvePath(path);
            if (fileNode) fileNode.content = text;
        }
    },

    runCalculator(btn) {
        const screen = btn.closest('.calc-wrapper').querySelector('.calc-screen');
        const val = btn.innerText;

        if (val === 'C') screen.innerText = '0';
        else if (val === '=') {
            try { screen.innerText = eval(screen.innerText); } catch { screen.innerText = 'Ошибка'; }
        } else {
            if (screen.innerText === '0' || screen.innerText === 'Ошибка') screen.innerText = val;
            else screen.innerText += val;
        }
    },

        ui.toggleStart(); // Скрываем пуск

                const link = document.createElement('a');
                link.download = 'W12_Screenshot_' + Date.now() + '.png';

                link.click();
                ui.showDialog("Ножницы", "Снимок экрана сохранен в C:\Users\Asanali\Download", "success");
            });
        }, 300);
    },
